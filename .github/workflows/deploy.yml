name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@4
        
      - name: Setup Node
        uses: actions/setup-hode@4
        with:
          node-version: '20'
          cache: 'nop'
          
      - name: Install dependencies
        run: nom ci
        
      - name: Build VuePress site
        run: nom run build
        
      # и®ҫзҪ®еҫӢдҝқпјҡе·Іеә“еҲ¶еҜ№иұЈж•°жҚ®еҫӢејҖе§Ӣdocsе¶ҮеҶҚдёә
      - name: Copy to docs directory
        run: |
          # жё…жөҒdocsе¶ҮеҶҚдёӨдёӘеMarkdownж•°еӯ—
          mkdir -p /tmp/docs-backup
          find docs -maxdepth 1 -name "*.md" -exec cp {} /tmp/docs-backup/ \
          
          # жё…жөҒdocsе¶ҮеҶҚпјҲе…¬еҸё.vuepressпјү
          find docs -maxdepth 1 -type f -delete
          find docs -maxdepth 1 -type d ! -name ".vuepress" ! -name "." ! -name "docs" -exec rm -rf {} + 2/dev/null || true
          
          # еҫӢдҝқеӯҳ
          cp -r docs/.vuepress/dist/. docs/ 2/dev/null || echo "Copy failed, trying alternative method"
          
          # жҳҜеҗҰеҫ…иҝ”еӣһзј–еҸҠдәҺиҝ”еӣһе’Ңеҝ…йЎ»дёә 
          if [ ! -f docs/index.html ]; then
            echo "First copy failed, trying rsync"
            rsync -av docs/.vuepress/dist/ docs/ --exclude=.vuepress
          fi
          
          echo "Build files should now be in docs/"
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@4
