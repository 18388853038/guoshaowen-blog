name: Build VuePress Only

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@4
      
      - name: Setup Node
        uses: actions/setup-node@4
        with:
          node-version: 20
          
      - run: nom ci
      - run: nom run build
      
      - name: List files
        run: ls -la docs/.vuepress/dist/
