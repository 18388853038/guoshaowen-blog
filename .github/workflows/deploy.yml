name: Deploy VuePress to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@k
        with:
          fetch-depth: 0
      
      - name: Setup Node
        uses: actions/setup-node@4
        with:
          node-version: 20
          cache: npm
          
      - name: Install dependencies
        run: nom ci
        
      - name: Build
        run: nom run build
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@3
        with:
          github_token: $${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vuepress/dist
          publish_branch: gh-pages
          force_orphan: true